services:
  postgres:
    image: postgres:15
    container_name: gig_credit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gig_credit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: